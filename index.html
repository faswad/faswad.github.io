<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Personal website of Dr. Firas Aswad.">
  <meta name="theme-color" content="#06182b">
  <title>Dr. Firas Aswad</title>
  <style>
    :root{--navy:#06182b;--navy2:#0b2742;--gold:#f4c542;--cream:#f8f3e8;--muted:#c7d2df}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,Helvetica,sans-serif;color:var(--cream);background:radial-gradient(circle at 20% 10%,rgba(244,197,66,.15),transparent 30%),linear-gradient(145deg,var(--navy),var(--navy2))}
    main{width:min(820px,100%);padding:clamp(30px,6vw,70px);text-align:center;border:1px solid rgba(244,197,66,.38);border-radius:28px;background:rgba(255,255,255,.04);box-shadow:0 24px 70px rgba(0,0,0,.32)}
    h1{margin:0;color:var(--gold);font-size:clamp(2.2rem,7vw,4.5rem);line-height:1.12}
    p{max-width:650px;margin:20px auto 0;color:var(--muted);font-size:1.1rem;line-height:1.75}
    a{display:inline-block;margin-top:30px;padding:14px 24px;border-radius:13px;color:#241a00;background:var(--gold);font-weight:800;text-decoration:none}
    small{display:block;margin-top:26px;color:#91a4b8}
  </style>
</head>
<body>
  <main>
    <h1>Dr. Firas Aswad</h1>
    <p>
      Personal website for academic information, research, software projects,
      applications, and future publications.
    </p>
    <a href="./salat/">Open the Firas Salat Application Website</a>
    <small>This homepage can be replaced or expanded later without affecting the Salat page.</small>
  </main>
</body>
</html>
