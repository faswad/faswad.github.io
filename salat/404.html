<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07131f">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
  <link rel="stylesheet" href="assets/css/style-wide.css?v=265-final">
  <title>الصفحة غير موجودة | Salat_FM</title>
  <style>
    .not-found{min-height:100vh;display:grid;place-items:center;padding:30px}.not-found-card{width:min(100%,650px);border:1px solid var(--line-strong);border-radius:30px;background:rgba(255,255,255,.03);padding:clamp(28px,7vw,64px);text-align:center}.not-found-card img{width:90px;height:90px;margin:0 auto 24px;border-radius:50%}.not-found-card h1{margin:0;font-size:clamp(2rem,7vw,4rem)}.not-found-card p{color:var(--muted);margin:12px 0 26px}
  </style>
</head>
<body>
  <main class="not-found">
    <section class="not-found-card">
      <img src="assets/images/logo-fm.webp" alt="" width="90" height="90">
      <p class="eyebrow">Salat_FM</p>
      <h1>الصفحة غير موجودة</h1>
      <p>قد يكون الرابط قديمًا أو كُتب بطريقة غير صحيحة.</p>
      <a class="button button-primary" href="./">العودة إلى صفحة التطبيق</a>
    </section>
  </main>
</body>
</html>
